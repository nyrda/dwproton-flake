name: Update DWProton

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Update package
        run: ./scripts/update-dwproton.sh

      - name: Validate flake
        run: |
          nix flake check --impure
          nix build .#dw-proton --impure --no-link

      - name: Check for package changes
        id: changes
        run: |
          if git diff --quiet -- default.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            version="$(sed -n 's/.*version = "\([^"]*\)";.*/\1/p' default.nix | head -n1)"
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and tag update
        if: steps.changes.outputs.changed == 'true'
        run: |
          version="${{ steps.changes.outputs.version }}"
          tag="dwproton-${version}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add default.nix
          git commit -m "Update DWProton to ${version}"
          git tag -a "$tag" -m "DWProton ${version}"
          git push origin HEAD:main
          git push origin "$tag"
